{% extends "base.html" %} {% block title %}登录{% endblock %} {% block content
%}
<div class="auth-page">
  <div class="auth-card">
    <h1>开始试衣之旅</h1>
    <form method="post">
      <div class="form-group">
        <label>邮箱</label>
        <input
          type="email"
          name="email"
          placeholder="your@email.com"
          required
        />
      </div>
      <div class="form-group">
        <label>密码</label>
        <input
          type="password"
          name="password"
          placeholder="输入密码"
          required
        />
      </div>
      <button type="submit" class="btn btn-primary">登录</button>
    </form>
    <div class="auth-links">
      <p>没有账号？<a href="{{ url_for('auth.register') }}">立即注册</a></p>
      <p><a href="{{ url_for('auth.reset_password') }}">忘记密码？</a></p>
    </div>
  </div>
</div>
{% endblock %}
